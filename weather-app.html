<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="theme-color" content="#00d4ff"/>
  <link rel="manifest" href="./manifest.json"/>
  <title>SkyCheck — Your Daily Weather</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#040409;
      --card:rgba(8,8,22,0.88);
      --border:rgba(255,255,255,0.07);
      --glow:rgba(0,212,255,0.18);
      --text:#f1f5f9;
      --muted:rgba(241,245,249,0.42);
      --cyan:#00d4ff;
      --purple:#a855f7;
      --orange:#f97316;
      --green:#22c55e;
      --yellow:#fbbf24;
      --red:#ef4444;
    }

    html{scroll-behavior:smooth}

    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh;overflow-x:hidden;
      color:var(--text);
      background:var(--bg);
    }
    body.day-clear   {background:linear-gradient(175deg,#020c1b 0%,#0a1628 45%,#0d1a30 100%)}
    body.day-clouds  {background:linear-gradient(175deg,#080810,#0e0f18,#14151f)}
    body.day-rain    {background:linear-gradient(175deg,#02040a,#060c14,#080f18)}
    body.day-snow    {background:linear-gradient(175deg,#060a14,#0c1220,#121a28)}
    body.day-storm   {background:linear-gradient(175deg,#02020a,#06060e,#08081a)}
    body.night-clear {background:linear-gradient(175deg,#010106,#030410,#050718)}
    body.night-clouds{background:linear-gradient(175deg,#030305,#060610,#090910)}
    body.night-rain  {background:linear-gradient(175deg,#020204,#04060e,#060810)}

    /* Canvas */
    #sky{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:1;transition:opacity 1.8s ease}
    #lightning{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:1;transition:opacity 0.06s}

    /* Page */
    .page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 80px}

    /* ── Header ── */
    .header{text-align:center;margin-bottom:10px}
    .app-name{
      font-size:2.4rem;font-weight:900;letter-spacing:-0.5px;
      background:linear-gradient(135deg,#00d4ff,#a855f7 60%,#ffffff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 24px rgba(0,212,255,0.35));
    }
    .tagline{font-size:0.78rem;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}

    /* ── Greeting ── */
    #greeting{
      font-size:1rem;font-weight:600;
      color:rgba(255,255,255,0.85);
      margin:12px 0 10px;text-align:center;
      text-shadow:0 1px 12px rgba(0,212,255,0.25);
      transition:opacity 0.6s;
    }

    /* ── Quote ── */
    #quoteBox{max-width:440px;width:100%;text-align:center;margin-bottom:18px;min-height:40px;padding:0 8px}
    .quote-text{
      font-size:0.88rem;font-style:italic;
      color:rgba(255,255,255,0.6);
      line-height:1.6;transition:opacity 0.9s;
    }

    /* ── City Pins ── */
    .pins-row{display:flex;gap:8px;flex-wrap:wrap;max-width:480px;width:100%;margin-bottom:14px;justify-content:center;min-height:0}
    .pin-btn{
      padding:6px 14px;border-radius:20px;
      background:rgba(0,212,255,0.08);
      border:1px solid rgba(0,212,255,0.25);
      color:var(--cyan);font-size:0.78rem;font-weight:600;
      cursor:pointer;transition:all 0.2s;white-space:nowrap;
    }
    .pin-btn:hover{background:rgba(0,212,255,0.18);transform:translateY(-1px)}

    /* ── Search ── */
    .search-wrap{display:flex;gap:8px;width:100%;max-width:480px;margin-bottom:20px}
    input{
      flex:1;padding:14px 18px;border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.04);backdrop-filter:blur(14px);
      color:var(--text);font-size:1rem;outline:none;
      transition:border-color 0.2s,box-shadow 0.2s;
    }
    input::placeholder{color:var(--muted)}
    input:focus{border-color:rgba(0,212,255,0.4);box-shadow:0 0 0 3px rgba(0,212,255,0.1)}
    .btn{
      padding:14px 20px;border-radius:14px;border:none;
      background:linear-gradient(135deg,#00d4ff,#0099cc);
      color:#020c1b;font-weight:800;font-size:0.95rem;cursor:pointer;
      transition:all 0.2s;white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,212,255,0.3);
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(0,212,255,0.45)}
    .btn:active{transform:translateY(0)}
    .btn-loc{
      padding:14px;
      background:rgba(255,255,255,0.05);color:var(--text);
      backdrop-filter:blur(8px);border:1px solid var(--border);
      font-size:1.1rem;box-shadow:none;
    }
    .btn-loc:hover{background:rgba(255,255,255,0.1);box-shadow:none;transform:none}

    /* ── Card base ── */
    .card{
      background:var(--card);backdrop-filter:blur(28px) saturate(160%);
      border:1px solid var(--border);border-radius:24px;
      padding:28px 24px;width:100%;max-width:480px;
      box-shadow:0 24px 60px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.05);
      margin-bottom:14px;
      transition:border-color 0.3s,box-shadow 0.3s;
      animation:fadeUp 0.5s ease;
    }
    .card:hover{border-color:rgba(0,212,255,0.12);box-shadow:0 28px 70px rgba(0,0,0,0.75),0 0 60px rgba(0,212,255,0.05),inset 0 1px 0 rgba(255,255,255,0.06)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    .section-label{
      font-size:0.62rem;font-weight:700;text-transform:uppercase;
      letter-spacing:2px;color:var(--muted);margin-bottom:14px;
      display:flex;align-items:center;gap:8px;
    }
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}

    /* ── Main weather card ── */
    .weather-icon-img{width:90px;height:90px;filter:drop-shadow(0 0 20px rgba(0,212,255,0.4));transition:transform 0.3s}
    .weather-icon-img:hover{transform:scale(1.1) rotate(-5deg)}

    .city-name{
      font-size:1.8rem;font-weight:900;margin:6px 0 2px;
      background:linear-gradient(135deg,#fff 0%,#a8d8ea 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .country-date{font-size:0.78rem;color:var(--muted);margin-bottom:14px}

    .temp-main{
      font-size:5rem;font-weight:900;line-height:1;
      background:linear-gradient(135deg,#00d4ff 0%,#7dd3fc 55%,#e0f2fe 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 28px rgba(0,212,255,0.35));
    }
    .unit-toggle{display:inline-flex;gap:6px;margin:8px 0 8px}
    .unit-toggle span{
      cursor:pointer;padding:3px 12px;border-radius:8px;
      border:1px solid var(--border);font-size:0.78rem;font-weight:600;
      transition:all 0.2s;color:var(--muted);
    }
    .unit-toggle span.active{background:rgba(0,212,255,0.15);color:var(--cyan);border-color:rgba(0,212,255,0.35)}
    .unit-toggle span:hover:not(.active){color:var(--text);border-color:rgba(255,255,255,0.15)}

    .condition{font-size:1rem;text-transform:capitalize;margin-bottom:4px;color:rgba(255,255,255,0.8)}

    .narrative{
      font-size:0.82rem;color:var(--muted);
      line-height:1.55;margin-bottom:16px;
      padding:10px 14px;
      background:rgba(255,255,255,0.03);
      border-left:2px solid rgba(0,212,255,0.35);
      border-radius:0 10px 10px 0;
    }

    /* Action buttons */
    .action-row{display:flex;gap:8px;margin-bottom:16px}
    .btn-action{
      flex:1;padding:10px 14px;border-radius:12px;border:none;
      font-size:0.8rem;font-weight:700;cursor:pointer;
      transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .btn-pin{background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.25)}
    .btn-pin:hover{background:rgba(168,85,247,0.22);transform:translateY(-1px)}
    .btn-pin.pinned{background:rgba(168,85,247,0.25);border-color:var(--purple)}
    .btn-share{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.25)}
    .btn-share:hover{background:rgba(34,197,94,0.2);transform:translateY(-1px)}

    /* Comfort */
    .comfort-row{
      display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,0.03);border-radius:12px;
      padding:10px 14px;margin-bottom:14px;
    }
    .comfort-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap}
    .comfort-track{flex:1;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .comfort-fill{height:100%;border-radius:3px;transition:width 1.2s ease}
    .comfort-val{font-size:0.88rem;font-weight:700;white-space:nowrap}

    /* Tip */
    .tip-banner{
      display:flex;align-items:flex-start;gap:10px;
      background:rgba(0,212,255,0.05);
      border:1px solid rgba(0,212,255,0.12);
      border-radius:14px;padding:12px 14px;
      font-size:0.84rem;line-height:1.5;margin-bottom:14px;
    }
    .tip-icon{font-size:1.3rem;flex-shrink:0;margin-top:1px}

    /* Outfit */
    .outfit-title{font-size:0.62rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:9px}
    .outfit-items{display:flex;flex-wrap:wrap;gap:7px}
    .outfit-item{
      background:rgba(255,255,255,0.05);border-radius:20px;
      padding:5px 12px;font-size:0.79rem;
      border:1px solid rgba(255,255,255,0.08);
      transition:all 0.2s;cursor:default;
    }
    .outfit-item:hover{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.25)}

    /* Details grid */
    .details-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .detail-box{
      background:rgba(255,255,255,0.04);border-radius:14px;
      padding:12px 6px;display:flex;flex-direction:column;
      align-items:center;gap:3px;
      border:1px solid rgba(255,255,255,0.06);
      transition:all 0.2s;cursor:default;
    }
    .detail-box:hover{background:rgba(0,212,255,0.07);border-color:rgba(0,212,255,0.18);transform:translateY(-2px)}
    .detail-icon{font-size:1.2rem}
    .detail-label{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px}
    .detail-value{font-size:0.9rem;font-weight:700}

    /* Sun times */
    .sun-times{
      display:flex;justify-content:space-around;
      background:rgba(255,255,255,0.03);border-radius:14px;padding:13px;
    }
    .sun-time{display:flex;flex-direction:column;align-items:center;gap:3px}
    .sun-time span:first-child{font-size:1.3rem}
    .sun-time .st-val{font-size:0.9rem;font-weight:700}
    .sun-time .st-lbl{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}

    /* ── AQI Card ── */
    .aqi-level{
      font-size:2rem;font-weight:900;margin:4px 0;
    }
    .aqi-bar{width:100%;height:8px;border-radius:4px;overflow:hidden;margin:10px 0;
      background:linear-gradient(90deg,#22c55e,#fbbf24,#f97316,#ef4444,#7c3aed)}
    .aqi-indicator{
      position:relative;height:100%;
    }
    .aqi-thumb{
      position:absolute;top:-3px;width:14px;height:14px;
      border-radius:50%;background:#fff;
      box-shadow:0 0 8px rgba(0,0,0,0.5);
      transform:translateX(-50%);
      transition:left 1s ease;
    }
    .aqi-components{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
    .aqi-comp{
      background:rgba(255,255,255,0.04);border-radius:10px;
      padding:8px;text-align:center;border:1px solid rgba(255,255,255,0.06);
    }
    .aqi-comp-val{font-size:0.88rem;font-weight:700}
    .aqi-comp-lbl{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}

    /* ── Hourly scroll ── */
    .hourly-scroll{
      display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
    }
    .hourly-scroll::-webkit-scrollbar{height:3px}
    .hourly-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.04);border-radius:2px}
    .hourly-scroll::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.3);border-radius:2px}
    .hour-item{
      flex-shrink:0;width:72px;
      display:flex;flex-direction:column;align-items:center;gap:5px;
      background:rgba(255,255,255,0.04);border-radius:14px;
      padding:12px 6px;
      border:1px solid rgba(255,255,255,0.06);
      scroll-snap-align:start;
      transition:all 0.2s;
    }
    .hour-item:hover{background:rgba(0,212,255,0.07);border-color:rgba(0,212,255,0.2)}
    .hour-item.now{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.35)}
    .hour-time{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
    .hour-item.now .hour-time{color:var(--cyan);font-weight:700}
    .hour-icon{width:32px;height:32px}
    .hour-temp{font-size:0.9rem;font-weight:700}
    .hour-pop{font-size:0.68rem;color:#7dd3fc}

    /* ── 5-day forecast ── */
    .forecast-row{display:flex;justify-content:space-between;gap:6px}
    .forecast-day{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
      background:rgba(255,255,255,0.04);border-radius:14px;padding:10px 3px;
      border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;cursor:default;
    }
    .forecast-day:hover{background:rgba(0,212,255,0.07);border-color:rgba(0,212,255,0.2);transform:translateY(-2px)}
    .forecast-day .day-name{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
    .forecast-day img{width:34px;height:34px}
    .forecast-day .day-temp{font-size:0.88rem;font-weight:700}
    .forecast-day .day-low{font-size:0.7rem;color:var(--muted)}

    /* ── Moon & Golden Hour card ── */
    .moon-row{display:flex;align-items:center;gap:20px;margin-bottom:16px}
    .moon-emoji{font-size:3.5rem;filter:drop-shadow(0 0 16px rgba(200,220,255,0.4))}
    .moon-info{flex:1}
    .moon-name{font-size:1.1rem;font-weight:800;margin-bottom:4px}
    .moon-sub{font-size:0.78rem;color:var(--muted)}
    .moon-illum{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(255,255,255,0.05);border-radius:20px;
      padding:4px 12px;font-size:0.78rem;margin-top:6px;
    }
    .illum-bar{width:50px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
    .illum-fill{height:100%;background:linear-gradient(90deg,#c5cae9,#fff);border-radius:2px}

    .golden-row{display:flex;justify-content:space-around;
      background:rgba(251,191,36,0.05);border:1px solid rgba(251,191,36,0.12);
      border-radius:14px;padding:12px;}
    .golden-item{display:flex;flex-direction:column;align-items:center;gap:4px}
    .golden-icon{font-size:1.4rem}
    .golden-val{font-size:0.9rem;font-weight:700;color:var(--yellow)}
    .golden-lbl{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}

    /* ── Wind compass card ── */
    .compass-wrap{display:flex;align-items:center;gap:20px}
    .compass-svg{flex-shrink:0}
    .wind-info{flex:1}
    .wind-speed-big{font-size:2.2rem;font-weight:900;color:var(--cyan);line-height:1}
    .wind-unit{font-size:0.8rem;color:var(--muted);margin-left:4px}
    .wind-dir-text{font-size:1rem;font-weight:700;margin:4px 0}
    .wind-desc{font-size:0.78rem;color:var(--muted);line-height:1.5}
    .beaufort-badge{
      display:inline-flex;align-items:center;gap:6px;
      background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);
      border-radius:8px;padding:4px 10px;font-size:0.75rem;margin-top:8px;
    }

    /* ── Best time card ── */
    .best-time-main{
      font-size:2rem;font-weight:900;
      background:linear-gradient(135deg,#22c55e,#86efac);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin:6px 0;
    }
    .best-time-cond{font-size:0.85rem;color:var(--muted)}
    .time-slots{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
    .time-slot{
      padding:6px 12px;border-radius:10px;font-size:0.78rem;font-weight:600;
      border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);
      display:flex;align-items:center;gap:6px;
    }
    .time-slot.best{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:var(--green)}
    .slot-dot{width:6px;height:6px;border-radius:50%}

    /* ── Health tips ── */
    .health-tip-card{
      background:rgba(255,255,255,0.04);border-radius:14px;
      padding:14px;border:1px solid rgba(255,255,255,0.07);
      min-height:80px;transition:all 0.2s;
    }
    .health-tip-title{font-size:0.85rem;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:8px}
    .health-tip-text{font-size:0.8rem;color:var(--muted);line-height:1.55}
    .tip-dots{display:flex;gap:5px;margin-top:12px}
    .tip-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all 0.3s;cursor:pointer}
    .tip-dot.active{background:var(--cyan);width:18px}

    /* ── Notify card ── */
    .notify-card{
      background:var(--card);backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:20px;
      padding:16px 20px;width:100%;max-width:480px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);animation:fadeUp 0.7s ease;
    }
    .notify-info strong{font-size:0.88rem;display:block;margin-bottom:3px}
    .notify-info span{font-size:0.72rem;color:var(--muted)}
    .btn-notify{
      padding:10px 16px;border-radius:12px;border:none;
      background:linear-gradient(135deg,#f97316,#ef4444);
      color:#fff;font-weight:700;font-size:0.8rem;cursor:pointer;
      white-space:nowrap;transition:all 0.2s;flex-shrink:0;
      box-shadow:0 4px 14px rgba(239,68,68,0.3);
    }
    .btn-notify:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(239,68,68,0.4)}
    .btn-notify:disabled{background:rgba(34,197,94,0.15);color:var(--green);cursor:default;transform:none;box-shadow:none;border:1px solid rgba(34,197,94,0.3)}

    /* Error / Loader */
    .error{
      background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);
      border-radius:14px;padding:16px;color:#fca5a5;
      font-size:0.88rem;max-width:480px;width:100%;text-align:center;
    }
    .loader{display:flex;flex-direction:column;align-items:center;gap:14px;padding:48px}
    .loader-text{font-size:0.84rem;color:var(--muted)}
    .spinner{width:40px;height:40px;border:2px solid rgba(0,212,255,0.15);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* UV badge */
    .uv-badge{
      display:inline-flex;align-items:center;gap:6px;
      border-radius:8px;padding:4px 10px;font-size:0.75rem;font-weight:700;
      margin-top:8px;
    }

    /* Scrollbar global */
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  <div id="lightning"></div>

  <div class="page">
    <div class="header">
      <div class="app-name">SkyCheck</div>
      <div class="tagline">Plan your day with confidence, every day</div>
    </div>

    <div id="greeting">What city would you like to check today?</div>
    <div id="quoteBox"><p class="quote-text" id="quoteText"></p></div>

    <div class="pins-row" id="pinsRow"></div>

    <div class="search-wrap">
      <input id="cityInput" type="text" placeholder="Search any city worldwide…"/>
      <button class="btn" id="searchBtn">Search</button>

<script>
const API_KEY = '846b0ba62e9aec5298158616cdf9cef0';

/* ═══════════════════════════════════════════════════
   CANVAS SCENE ENGINE
═══════════════════════════════════════════════════ */
const sky = document.getElementById('sky');
const ctx = sky.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
sky.width = W; sky.height = H;
window.addEventListener('resize', () => { W=sky.width=window.innerWidth; H=sky.height=window.innerHeight; });

let animFrame=null, sceneMode='idle', transitioning=false;
let clouds=[], rainDrops=[], splashes=[], snowFlakes=[], stars=[];

class Cloud {
  constructor(dark, scale, yFrac) {
    this.dark=dark; this.scale=scale??1; this.yFrac=yFrac??Math.random()*0.34+0.02;
    this.reset(true);
  }
  reset(edge) {
    const s=this.scale;
    this.speed=0.12+Math.random()*0.22;
    this.w=(130+Math.random()*90)*s;
    this.h=(48+Math.random()*34)*s;
    this.x=edge?-this.w*1.4:Math.random()*W;
    this.y=H*this.yFrac;
    this.alpha=this.dark?0.58+Math.random()*0.22:0.72+Math.random()*0.2;
    // Random organic puffs along the top silhouette
    const np=5+Math.floor(Math.random()*4);
    this.puffs=[];
    for(let i=0;i<np;i++){
      const fx=(i/(np-1)-0.5)*this.w*0.88;
      const fr=(0.32+Math.random()*0.28)*this.h;
      const fy=-this.h*0.18-fr*0.38+(Math.random()-0.5)*this.h*0.28;
      this.puffs.push({dx:fx,dy:fy,r:fr});
    }
  }
  update(){this.x+=this.speed;if(this.x-this.w*1.5>W)this.reset(false);}
  draw(){
    ctx.save();ctx.translate(this.x,this.y);
    if(this.dark){
      // Storm cloud: deep grey-blue, heavy base, dramatic
      const shadow=ctx.createRadialGradient(0,this.h*0.28,0,0,0,this.w*0.72);
      shadow.addColorStop(0,`rgba(14,16,28,${this.alpha*0.55})`);shadow.addColorStop(1,'rgba(14,16,28,0)');
      ctx.fillStyle=shadow;ctx.beginPath();ctx.ellipse(0,this.h*0.1,this.w*0.74,this.h*0.52,0,0,Math.PI*2);ctx.fill();
      this.puffs.forEach(p=>{
        const g=ctx.createRadialGradient(p.dx-p.r*0.14,p.dy-p.r*0.14,0,p.dx,p.dy,p.r);
        g.addColorStop(0,`rgba(58,62,88,${this.alpha})`);g.addColorStop(0.5,`rgba(40,44,66,${this.alpha*0.88})`);g.addColorStop(1,'rgba(24,27,46,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.dx,p.dy,p.r,0,Math.PI*2);ctx.fill();
      });
      // Flat heavy base (rain clouds are flat-bottomed)
      const base=ctx.createLinearGradient(0,0,0,this.h*0.5);
      base.addColorStop(0,`rgba(32,35,54,${this.alpha*0.65})`);base.addColorStop(1,'rgba(20,22,38,0)');
      ctx.fillStyle=base;ctx.beginPath();ctx.ellipse(0,this.h*0.14,this.w*0.62,this.h*0.26,0,0,Math.PI*2);ctx.fill();
    } else {
      // White cloud: warm lit top, cool blue-grey base like real cumulus
      const glow=ctx.createRadialGradient(this.w*0.08,-this.h*0.45,0,0,0,this.w*0.72);
      glow.addColorStop(0,`rgba(215,228,248,${this.alpha*0.22})`);glow.addColorStop(1,'rgba(180,205,238,0)');
      ctx.fillStyle=glow;ctx.beginPath();ctx.ellipse(0,0,this.w*0.68,this.h*0.58,0,0,Math.PI*2);ctx.fill();
      this.puffs.forEach(p=>{
        const lx=p.dx-p.r*0.28,ly=p.dy-p.r*0.32;
        const g=ctx.createRadialGradient(lx,ly,0,p.dx,p.dy,p.r);
        g.addColorStop(0,`rgba(255,255,255,${this.alpha})`);
        g.addColorStop(0.28,`rgba(245,250,255,${this.alpha*0.92})`);
        g.addColorStop(0.62,`rgba(218,234,252,${this.alpha*0.52})`);
        g.addColorStop(1,'rgba(195,218,250,0)');
        ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.dx,p.dy,p.r,0,Math.PI*2);ctx.fill();
      });
      // Blue-grey flat base (natural shadow underside of cloud)
      const base=ctx.createLinearGradient(0,-this.h*0.08,0,this.h*0.44);
      base.addColorStop(0,'rgba(180,200,235,0)');base.addColorStop(1,`rgba(158,178,218,${this.alpha*0.32})`);
      ctx.fillStyle=base;ctx.beginPath();ctx.ellipse(0,this.h*0.12,this.w*0.6,this.h*0.24,0,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

class RainDrop {
  constructor(heavy){
    this.heavy=heavy;
    this.far=Math.random()<0.38; // depth layer: far=background, near=foreground
    this.reset();
  }
  reset(){
    this.x=Math.random()*(W+120)-60;
    this.y=-80-Math.random()*220;
    this.wind=0.16+Math.random()*0.06; // consistent wind lean (radians from vertical)
    if(this.heavy){
      this.speed=this.far?11+Math.random()*4:19+Math.random()*9;
      this.len=this.far?38+Math.random()*22:65+Math.random()*35;
      this.alpha=this.far?0.10+Math.random()*0.08:0.25+Math.random()*0.18;
      this.w=this.far?0.35:0.75+Math.random()*0.55;
    } else {
      this.speed=this.far?7+Math.random()*3:12+Math.random()*5;
      this.len=this.far?22+Math.random()*14:40+Math.random()*22;
      this.alpha=this.far?0.07+Math.random()*0.07:0.16+Math.random()*0.12;
      this.w=this.far?0.28:0.48+Math.random()*0.38;
    }
  }
  update(){
    this.x+=this.speed*Math.sin(this.wind);
    this.y+=this.speed*Math.cos(this.wind);
    if(this.y>H+20){
      if(!this.far&&Math.random()<0.28)splashes.push(new Splash(this.x,H-2));
      this.reset();
    }
  }
  draw(){
    const dx=this.len*Math.sin(this.wind), dy=this.len*Math.cos(this.wind);
    const g=ctx.createLinearGradient(this.x,this.y,this.x+dx,this.y+dy);
    g.addColorStop(0,'rgba(200,225,248,0)');
    g.addColorStop(0.45,`rgba(205,228,250,${this.alpha*0.45})`);
    g.addColorStop(1,`rgba(212,234,252,${this.alpha})`);
    ctx.strokeStyle=g; ctx.lineWidth=this.w; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x+dx,this.y+dy); ctx.stroke();
  }
}
class Splash {
  constructor(x,y){
    this.x=x; this.y=y; this.age=0; this.maxAge=22+Math.random()*14;
    this.rx=1.8+Math.random()*3.5;
    this.drops=Array.from({length:2+Math.floor(Math.random()*3)},()=>({
      a:Math.random()*Math.PI*2, s:0.6+Math.random()*1.6, d:0
    }));
  }
  update(){ this.age++; this.drops.forEach(d=>d.d+=d.s); }
  dead(){ return this.age>=this.maxAge; }
  draw(){
    const p=this.age/this.maxAge, al=0.32*(1-p);
    ctx.strokeStyle=`rgba(200,228,248,${al})`; ctx.lineWidth=0.6;
    ctx.beginPath(); ctx.ellipse(this.x,this.y,this.rx*(1+p*2.2),this.rx*0.28*(1+p),0,0,Math.PI*2); ctx.stroke();
    this.drops.forEach(d=>{
      const da=al*0.65*(1-d.d/(d.s*this.maxAge));
      if(da>0.01){
        ctx.fillStyle=`rgba(205,230,250,${da})`;
        ctx.beginPath(); ctx.arc(this.x+Math.cos(d.a)*d.d,this.y+Math.sin(d.a)*d.d*0.38,0.85,0,Math.PI*2); ctx.fill();
      }
    });
  }
}
class SnowFlake {
  constructor(){ this.reset(); }
  reset(){ this.x=Math.random()*W;this.y=-20-Math.random()*80;this.r=2+Math.random()*4.5;this.speed=0.7+Math.random()*1.4;this.drift=(Math.random()-0.5)*0.45;this.alpha=0.55+Math.random()*0.4;this.angle=0;this.spin=(Math.random()-0.5)*0.04; }
  update(){ this.y+=this.speed;this.x+=this.drift;this.angle+=this.spin;if(this.y>H+10)this.reset(); }
  draw(){ ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);ctx.strokeStyle=`rgba(220,235,255,${this.alpha})`;ctx.lineWidth=0.9; for(let i=0;i<6;i++){ctx.save();ctx.rotate((i*Math.PI)/3);ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,this.r);ctx.stroke();ctx.beginPath();ctx.moveTo(0,this.r*0.5);ctx.lineTo(this.r*0.28,this.r*0.22);ctx.stroke();ctx.beginPath();ctx.moveTo(0,this.r*0.5);ctx.lineTo(-this.r*0.28,this.r*0.22);ctx.stroke();ctx.restore();}ctx.restore(); }
}
class Star {
  constructor(){ this.x=Math.random()*W;this.y=Math.random()*H*0.65;this.r=0.4+Math.random()*1.8;this.phase=Math.random()*Math.PI*2;this.speed=0.3+Math.random()*0.8;this.col=Math.random()>0.9?'255,210,160':Math.random()>0.8?'190,210,255':'255,255,255'; }
  draw(t){ const a=0.3+0.7*Math.abs(Math.sin(this.phase+t*this.speed*0.0008));ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(${this.col},${a})`;ctx.fill();if(this.r>1.3&&a>0.7){ctx.strokeStyle=`rgba(${this.col},${a*0.35})`;ctx.lineWidth=0.5;const cr=this.r*3;ctx.beginPath();ctx.moveTo(this.x-cr,this.y);ctx.lineTo(this.x+cr,this.y);ctx.stroke();ctx.beginPath();ctx.moveTo(this.x,this.y-cr);ctx.lineTo(this.x,this.y+cr);ctx.stroke();} }
}

function drawSun(t) {
  const sx=W*0.80, sy=H*0.09;
  // Wide sky atmospheric warmth — fills entire sky gradually
  const atm=ctx.createRadialGradient(sx,sy,0,sx,sy,W*0.92);
  atm.addColorStop(0,'rgba(255,238,145,0.30)');atm.addColorStop(0.06,'rgba(255,200,55,0.22)');
  atm.addColorStop(0.18,'rgba(255,145,20,0.13)');atm.addColorStop(0.38,'rgba(220,85,10,0.06)');
  atm.addColorStop(0.65,'rgba(160,40,5,0.02)');atm.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=atm; ctx.fillRect(0,0,W,H);
  // Breathing outer corona (subtle pulse — no rays)
  const pulse=1+0.038*Math.sin(t*0.0007);
  const outerR=108*pulse;
  const outer=ctx.createRadialGradient(sx,sy,22,sx,sy,outerR);
  outer.addColorStop(0,'rgba(255,248,195,0.70)');outer.addColorStop(0.22,'rgba(255,218,70,0.42)');
  outer.addColorStop(0.52,'rgba(255,158,28,0.16)');outer.addColorStop(1,'rgba(255,110,0,0)');
  ctx.fillStyle=outer; ctx.beginPath(); ctx.arc(sx,sy,outerR,0,Math.PI*2); ctx.fill();
  // Mid corona — warm diffuse ring
  const mid=ctx.createRadialGradient(sx,sy,16,sx,sy,52);
  mid.addColorStop(0,'rgba(255,255,225,0.92)');mid.addColorStop(0.38,'rgba(255,228,80,0.78)');
  mid.addColorStop(1,'rgba(255,165,22,0)');
  ctx.fillStyle=mid; ctx.beginPath(); ctx.arc(sx,sy,52,0,Math.PI*2); ctx.fill();
  // Sun disc — hot white core, natural yellow edge
  const disc=ctx.createRadialGradient(sx-5,sy-5,0,sx,sy,27);
  disc.addColorStop(0,'rgba(255,255,252,1)');disc.addColorStop(0.28,'rgba(255,248,185,1)');
  disc.addColorStop(0.65,'rgba(255,222,68,0.97)');disc.addColorStop(1,'rgba(255,188,28,0.88)');
  ctx.fillStyle=disc; ctx.beginPath(); ctx.arc(sx,sy,27,0,Math.PI*2); ctx.fill();
  // Soft shimmer glints (not mechanical rays — just gentle brightness variation)
  const shimA=0.045+0.028*Math.sin(t*0.0011);
  [[-1.2,-0.9],[1.1,-0.6],[-0.7,1.1],[1.3,0.7]].forEach(([fx,fy])=>{
    const flx=sx+fx*20,fly=sy+fy*16;
    const fl=ctx.createRadialGradient(flx,fly,0,flx,fly,30);
    fl.addColorStop(0,`rgba(255,250,200,${shimA})`);fl.addColorStop(1,'rgba(255,250,200,0)');
    ctx.fillStyle=fl; ctx.beginPath(); ctx.arc(flx,fly,30,0,Math.PI*2); ctx.fill();
  });
  // Lens flare along diagonal toward center
  const cx=W/2,cy=H/2;
  [[0.32,13,0.10],[0.58,7,0.14],[0.78,20,0.08],[0.96,9,0.11],[1.18,28,0.06]].forEach(([d,r,al])=>{
    const flx=sx+(cx-sx)*d,fly=sy+(cy-sy)*d;
    const fg=ctx.createRadialGradient(flx,fly,0,flx,fly,r);
    fg.addColorStop(0,`rgba(255,248,178,${al})`);fg.addColorStop(1,'rgba(255,248,178,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(flx,fly,r,0,Math.PI*2); ctx.fill();
  });
}
function drawMoon(t) {
  const mx=W*0.80,my=H*0.10,fl=Math.sin(t*0.0004)*8;
  const glow=ctx.createRadialGradient(mx,my+fl,0,mx,my+fl,88);
  glow.addColorStop(0,'rgba(190,205,255,0.16)');glow.addColorStop(1,'rgba(140,155,210,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(mx,my+fl,88,0,Math.PI*2);ctx.fill();
  const d=ctx.createRadialGradient(mx-7,my-7+fl,0,mx,my+fl,33);
  d.addColorStop(0,'rgba(255,252,228,1)');d.addColorStop(0.5,'rgba(210,222,255,0.97)');d.addColorStop(1,'rgba(175,192,240,0.92)');
  ctx.fillStyle=d;ctx.beginPath();ctx.arc(mx,my+fl,33,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(3,4,18,0.52)';ctx.beginPath();ctx.arc(mx+11,my+fl,27,0,Math.PI*2);ctx.fill();
}

const SCENE_BG={
  'idle':['#040409','#040409'],'sunny':['#020c1b','#0d1a30'],'partly-cloudy':['#080810','#14151f'],
  'cloudy':['#080810','#14151f'],'rain':['#02040a','#080f18'],'night-rain':['#020204','#060810'],
  'storm':['#02020a','#08081a'],'snow':['#060a14','#121a28'],'fog':['#080810','#14151f'],
  'night-clear':['#010106','#050718'],'night-cloudy':['#030305','#090910']
};
function renderLoop(t) {
  // Draw gradient background matching the scene — prevents transparent edges at top/bottom
  const bg = ctx.createLinearGradient(0,0,0,H);
  const [c0,c1] = SCENE_BG[sceneMode] || ['#040409','#040409'];
  bg.addColorStop(0,c0); bg.addColorStop(1,c1);
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  if(sceneMode==='sunny'||sceneMode==='partly-cloudy') drawSun(t);
  if(sceneMode==='night-clear'||sceneMode==='night-cloudy') { stars.forEach(s=>s.draw(t)); drawMoon(t); }
  clouds.forEach(c=>{c.update();c.draw()});
  if(sceneMode==='rain'||sceneMode==='storm'||sceneMode==='night-rain') {
    // Far layer first, then near — creates depth
    rainDrops.filter(r=>r.far).forEach(r=>{r.update();r.draw()});
    // Atmospheric rain mist at ground level
    const mistA=sceneMode==='storm'?0.13:0.07;
    const mist=ctx.createLinearGradient(0,H*0.62,0,H);
    mist.addColorStop(0,'rgba(110,140,175,0)');mist.addColorStop(1,`rgba(110,140,175,${mistA})`);
    ctx.fillStyle=mist; ctx.fillRect(0,0,W,H);
    rainDrops.filter(r=>!r.far).forEach(r=>{r.update();r.draw()});
    splashes=splashes.filter(s=>!s.dead()); splashes.forEach(s=>{s.update();s.draw()});
  }
  if(sceneMode==='snow') snowFlakes.forEach(f=>{f.update();f.draw()});
  animFrame=requestAnimationFrame(renderLoop);
}
animFrame=requestAnimationFrame(renderLoop);

function buildScene(d) {
  clouds=[];rainDrops=[];snowFlakes=[];stars=[];splashes=[];
  document.body.className='';
  const id=d.weather[0].id, icon=d.weather[0].icon, night=icon.endsWith('n');
  if(id>=200&&id<300){sceneMode='storm';document.body.classList.add('day-storm');for(let i=0;i<6;i++)clouds.push(new Cloud(true,0.9+Math.random()*0.5,Math.random()*0.38));for(let i=0;i<190;i++)rainDrops.push(new RainDrop(true));flashLightning();}
  else if(id>=300&&id<600){sceneMode=night?'night-rain':'rain';document.body.classList.add(night?'night-rain':'day-rain');for(let i=0;i<5;i++)clouds.push(new Cloud(true,0.85+Math.random()*0.4,Math.random()*0.35));for(let i=0;i<(id>=500?150:85);i++)rainDrops.push(new RainDrop(id>=500));}
  else if(id>=600&&id<700){sceneMode='snow';document.body.classList.add('day-snow');for(let i=0;i<4;i++)clouds.push(new Cloud(false,0.9+Math.random()*0.3,Math.random()*0.28));for(let i=0;i<75;i++)snowFlakes.push(new SnowFlake());}
  else if(id>=700&&id<800){sceneMode='fog';document.body.classList.add('day-clouds');for(let i=0;i<9;i++)clouds.push(new Cloud(false,0.7+Math.random()*0.5,Math.random()*0.55));}
  else if(id===800){if(night){sceneMode='night-clear';document.body.classList.add('night-clear');for(let i=0;i<120;i++)stars.push(new Star());}else{sceneMode='sunny';document.body.classList.add('day-clear');}}
  else{const n=id===801?2:id===802?4:6;if(night){sceneMode='night-cloudy';document.body.classList.add('night-clouds');for(let i=0;i<60;i++)stars.push(new Star());}else{sceneMode=id<=802?'partly-cloudy':'cloudy';document.body.classList.add('day-clouds');}for(let i=0;i<n;i++){const dk=id>802;clouds.push(new Cloud(dk,0.8+Math.random()*0.6,Math.random()*0.38));if(i%2===0)clouds.push(new Cloud(dk,0.55+Math.random()*0.35,Math.random()*0.28));}}
}

let ltTimer=null;
function flashLightning() {
  const el=document.getElementById('lightning');
  function flash(){el.style.opacity='0.22';setTimeout(()=>{el.style.opacity='0';setTimeout(()=>{el.style.opacity='0.15';setTimeout(()=>{el.style.opacity='0';},75);},75);},110);ltTimer=setTimeout(flash,5000+Math.random()*7000);}
  flash();
}
function transitionScene(data) {
  if(transitioning)return;transitioning=true;
  sky.style.opacity='0';
  setTimeout(()=>{buildScene(data);sky.style.opacity='1';transitioning=false;},1800);
}

/* ═══════════════════════════════════════════════════
   HELPER FUNCTIONS
═══════════════════════════════════════════════════ */
const toF=c=>+(c*9/5+32).toFixed(1);
function fmt(unix,tz){const d=new Date((unix+tz+new Date().getTimezoneOffset()*60)*1000);return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});}
function fmtHour(unix){const d=new Date(unix*1000);return d.toLocaleTimeString('en-US',{hour:'numeric',hour12:true});}

function moonPhase() {
  const epoch=new Date(2000,0,6,18,14,0);
  const days=(Date.now()-epoch)/(864e5);
  const cycle=29.53058867;
  const pct=((days%cycle)+cycle)%cycle/cycle;
  const ill=Math.round(50*(1-Math.cos(pct*2*Math.PI)));
  let name,emoji;
  if(pct<0.033||pct>0.967){name='New Moon';emoji='🌑';}
  else if(pct<0.216){name='Waxing Crescent';emoji='🌒';}
  else if(pct<0.283){name='First Quarter';emoji='🌓';}
  else if(pct<0.466){name='Waxing Gibbous';emoji='🌔';}
  else if(pct<0.533){name='Full Moon';emoji='🌕';}
  else if(pct<0.716){name='Waning Gibbous';emoji='🌖';}
  else if(pct<0.783){name='Last Quarter';emoji='🌗';}
  else{name='Waning Crescent';emoji='🌘';}
  const daysToFull=pct<0.5?Math.round((0.5-pct)*cycle):Math.round((1.5-pct)*cycle);
  return{name,emoji,ill,daysToFull,pct};
}

function goldenHours(sunrise,sunset,tz) {
  const sr=new Date((sunrise+tz+new Date().getTimezoneOffset()*60)*1000);
  const ss=new Date((sunset+tz+new Date().getTimezoneOffset()*60)*1000);
  const p=d=>d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  return{
    morning:`${p(new Date(sr-30*60e3))} – ${p(new Date(sr+40*60e3))}`,
    evening:`${p(new Date(ss-45*60e3))} – ${p(new Date(ss+25*60e3))}`
  };
}

function windDir(deg) {
  return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16];
}
function beaufort(ms) {
  if(ms<0.3)return{n:0,d:'Calm'};if(ms<1.6)return{n:1,d:'Light air'};if(ms<3.4)return{n:2,d:'Light breeze'};
  if(ms<5.5)return{n:3,d:'Gentle breeze'};if(ms<8)return{n:4,d:'Moderate breeze'};if(ms<10.8)return{n:5,d:'Fresh breeze'};
  if(ms<13.9)return{n:6,d:'Strong breeze'};if(ms<17.2)return{n:7,d:'Near gale'};if(ms<20.8)return{n:8,d:'Gale'};
  if(ms<24.5)return{n:9,d:'Strong gale'};if(ms<28.5)return{n:10,d:'Storm'};if(ms<32.7)return{n:11,d:'Violent storm'};
  return{n:12,d:'Hurricane'};
}

function estimateUVI(d) {
  const h=new Date().getHours(), cloud=d.clouds.all, id=d.weather[0].id;
  if(h<6||h>19)return 0;
  const base=Math.max(0,10-Math.abs(h-12)*1.15);
  const cf=1-(cloud/100)*0.75;
  const wf=id>=200&&id<600?0.1:id>=600&&id<800?0.3:1;
  return Math.max(0,+(base*cf*wf).toFixed(1));
}
function uviLabel(v){
  if(v<=2)return{label:'Low',color:'#22c55e'};if(v<=5)return{label:'Moderate',color:'#fbbf24'};
  if(v<=7)return{label:'High',color:'#f97316'};if(v<=10)return{label:'Very High',color:'#ef4444'};
  return{label:'Extreme',color:'#7c3aed'};
}

function getNarrative(d) {
  const id=d.weather[0].id,t=d.main.temp,h=d.main.humidity,w=d.wind.speed,icon=d.weather[0].icon,night=icon.endsWith('n');
  const city=d.name,cond=d.weather[0].description;
  let sky,feel,outro;
  if(id>=200&&id<300)sky=`A powerful thunderstorm is sweeping through ${city}`;
  else if(id>=300&&id<400)sky=`Light drizzle is falling over ${city}`;
  else if(id>=500&&id<600)sky=`Rain is falling steadily over ${city}`;
  else if(id>=600&&id<700)sky=`Snow is falling softly across ${city}`;
  else if(id>=700&&id<800)sky=`${cond.charAt(0).toUpperCase()+cond.slice(1)} is reducing visibility in ${city}`;
  else if(id===800&&night)sky=`A clear night sky stretches over ${city}`;
  else if(id===800)sky=`Clear blue skies are overhead in ${city}`;
  else sky=`${cond.charAt(0).toUpperCase()+cond.slice(1)} over ${city}`;
  if(t<0)feel=`at a freezing ${Math.round(t)}°C`;
  else if(t<8)feel=`with a bitter chill at ${Math.round(t)}°C`;
  else if(t<15)feel=`at a cool ${Math.round(t)}°C`;
  else if(t<22)feel=`at a comfortable ${Math.round(t)}°C`;
  else if(t<28)feel=`at a warm ${Math.round(t)}°C`;
  else feel=`at a hot ${Math.round(t)}°C`;
  if(h>80&&t>22)outro='High humidity makes it feel muggy outside.';
  else if(w>15)outro='Strong winds are making it feel significantly colder.';
  else if(id===800&&t>18&&t<26)outro='Ideal conditions — a great time to be outside.';
  else if(id>=500&&id<600)outro='Stay dry and carry an umbrella before heading out.';
  else outro='Dress for the conditions before stepping out.';
  return`${sky} ${feel}. ${outro}`;
}

function getComfort(d) {
  let s=10,t=d.main.temp,h=d.main.humidity,w=d.wind.speed,id=d.weather[0].id;
  if(t<0||t>38)s-=4;else if(t<5||t>35)s-=2.5;else if(t<10||t>30)s-=1;
  if(h>85)s-=2;else if(h>70)s-=0.8;
  if(w>15)s-=2;else if(w>10)s-=0.8;
  if(id>=200&&id<300)s-=3;else if(id>=500&&id<600)s-=1.5;else if(id>=600&&id<700)s-=1.5;
  s=Math.max(1,Math.min(10,Math.round(s)));
  const color=s>=8?'#22c55e':s>=6?'#fbbf24':s>=4?'#f97316':'#ef4444';
  const label=s>=8?'Very comfortable':s>=6?'Comfortable':s>=4?'Uncomfortable':'Harsh';
  return{s,color,label};
}

function getTip(d) {
  const id=d.weather[0].id,t=d.main.temp,w=d.wind.speed,icon=d.weather[0].icon,night=icon.endsWith('n');
  if(id>=200&&id<300)return{icon:'⛈️',text:'Heavy storm — stay indoors, unplug electronics, avoid windows and open fields.'};
  if(id>=300&&id<400)return{icon:'🌦️',text:'Light drizzle today. A compact umbrella in your bag is all you need.'};
  if(id>=500&&id<600)return{icon:'🌂',text:"It's raining — grab an umbrella and wear waterproof shoes before stepping out."};
  if(id>=600&&id<700)return{icon:'🧥',text:'Snowy outside! Warm layers, snow boots, and watch for ice on pavements.'};
  if(id>=700&&id<800)return{icon:'🌫️',text:'Low visibility — drive slowly, use headlights, and keep safe following distances.'};
  if(id===800&&night)return{icon:'🌙',text:"Clear night skies — great for stargazing. It'll get chilly; keep a jacket nearby."};
  if(id===800&&t>38)return{icon:'🚨',text:'Extreme heat alert! Stay indoors, drink water every 30 mins, avoid the sun 11am–4pm.'};
  if(id===800&&t>32)return{icon:'🥵',text:'Very hot today. Drink cold juices, wear breathable fabrics, stay in shade.'};
  if(id===800&&t>25)return{icon:'😎',text:'Beautiful sunny day! SPF 30+ sunscreen and sunglasses are your best friends.'};
  if(id===800)return{icon:'🌤️',text:"Clear skies — a perfect day for a walk, run, or time outdoors."};
  if(id>800&&w>12)return{icon:'🍃',text:'Cloudy with strong winds. Secure loose items and brace yourself going outside.'};
  if(id>800)return{icon:'☁️',text:'Overcast today. A light jacket will keep you comfortable as temps shift.'};
  if(t<0)return{icon:'🥶',text:'Below freezing! Heavy coat, gloves and scarf are essential. Watch for black ice.'};

  if(t>35)return{icon:'💧',text:'Very warm. Keep drinking water and cool juices, wear loose light clothing.'};
  return{icon:'🌡️',text:'Dress for the weather and check conditions before heading out.'};

function getOutfit(d) {
  const id=d.weather[0].id,t=d.main.temp,w=d.wind.speed,h=d.main.humidity;
  const items=[];
  if(t<0)items.push('🧥 Heavy coat','🥾 Insulated boots','🧤 Gloves','🧣 Thick scarf');
  else if(t<8)items.push('🧥 Warm jacket','🧣 Scarf','👟 Closed shoes');
  else if(t<15)items.push('🧶 Light jacket','👖 Long trousers');
  else if(t<22)items.push('👕 Long sleeve','🪻 Light layer');
  else if(t<30)items.push('👕 T-shirt','🩳 Shorts or light trousers');
  else items.push('👕 Very light clothing','🩱 Breathable fabrics');
  if(id>=300&&id<600)items.push('🌂 Umbrella','👟 Waterproof shoes');
  if(id>=600&&id<700)items.push('🥾 Snow boots','🧤 Gloves','🧣 Warm scarf');
  if(id===800&&t>25)items.push('🕶️ Sunglasses','🧴 Sunscreen SPF 30+');
  if(w>12)items.push('🧢 Secure your hat');
  if(h>80&&t>24)items.push('💧 Breathable fabric only');
  return[...new Set(items)].slice(0,7);
}

function getBestTime(fcast,tz) {
  const now=Date.now()/1000;
  const slots=fcast.list.filter(i=>i.dt>now&&i.dt<now+14*3600).slice(0,5);
  if(!slots.length)return null;
  return slots.map(item=>{
    let s=10,t=item.main.temp,id=item.weather[0].id,h=new Date(item.dt*1000).getHours();
    if(t<5||t>35)s-=3;else if(t<10||t>30)s-=1.5;
    if(id>=200&&id<300)s-=5;else if(id>=300&&id<600)s-=4;else if(id>=600&&id<700)s-=2;
    if(item.wind.speed>15)s-=2;
    if(h>=9&&h<=17)s+=1;
    const lTime=new Date((item.dt+tz+new Date().getTimezoneOffset()*60)*1000);
    return{time:lTime.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}),
      score:Math.max(0,Math.round(s)),id,t:Math.round(t),pop:Math.round((item.pop??0)*100)};
  });
}

function compassSVG(deg, speed) {
  const cx=65,cy=65,r=50,col=speed>15?'#f97316':speed>8?'#fbbf24':'#00d4ff';
  const ticks=Array.from({length:16},(_,i)=>{const a=(i/16)*Math.PI*2,inner=i%4===0?r-14:r-8,lw=i%4===0?1.5:0.8,lo=i%4===0?0.35:0.12;return`<line x1="${cx+Math.cos(a-Math.PI/2)*inner}" y1="${cy+Math.sin(a-Math.PI/2)*inner}" x2="${cx+Math.cos(a-Math.PI/2)*(r-2)}" y2="${cy+Math.sin(a-Math.PI/2)*(r-2)}" stroke="rgba(255,255,255,${lo})" stroke-width="${lw}"/>`}).join('');
  return`<svg width="130" height="130" viewBox="0 0 130 130"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/><circle cx="${cx}" cy="${cy}" r="${r-10}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>${ticks}<text x="${cx}" y="9" text-anchor="middle" fill="${col}" font-size="10" font-weight="800">N</text><text x="${cx}" y="127" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">S</text><text x="7" y="${cy+4}" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">W</text><text x="125" y="${cy+4}" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="10">E</text><g transform="translate(${cx},${cy}) rotate(${deg})"><polygon points="0,${-(r*0.55)} -5,8 0,4 5,8" fill="${col}" opacity="0.95"/><polygon points="0,${r*0.35} -4,-5 0,-1 4,-5" fill="rgba(255,255,255,0.25)"/></g><circle cx="${cx}" cy="${cy}" r="4" fill="${col}" opacity="0.9"/></svg>`;
}

let quoteList=[],quoteIdx=0,quoteTimer=null;
function pickQuotes(d){
  const id=d.weather[0].id,t=d.main.temp,w=d.wind.speed,icon=d.weather[0].icon;
  const hour=new Date((Date.now()/1000+d.timezone+new Date().getTimezoneOffset()*60)*1000).getHours();
  let wx;
  if(id>=200&&id<300)wx=Q.storm;else if(id>=300&&id<600)wx=Q.rain;else if(id>=600&&id<700)wx=Q.snow;
  else if(id===800&&t>30)wx=Q.hot;else if(id===800)wx=Q.clear;else if(id>800)wx=w>10?Q.windy:Q.clouds;else wx=Q.clear;
  if(t<5)wx=[...wx,...Q.cold];
  const time=hour>=5&&hour<12?Q.morning:hour>=12&&hour<17?Q.afternoon:hour>=17&&hour<21?Q.evening:Q.night;
  quoteList=[...new Set([...wx,...time])];quoteIdx=0;startQuotes();
}
function startQuotes(){if(quoteTimer)clearInterval(quoteTimer);showQuote();quoteTimer=setInterval(showQuote,12000);}
function showQuote(){if(!quoteList.length)return;const el=document.getElementById('quoteText');if(!el)return;el.style.opacity='0';setTimeout(()=>{el.textContent=quoteList[quoteIdx%quoteList.length];el.style.opacity='1';quoteIdx++;},800);}
(function(){const h=new Date().getHours();quoteList=h>=5&&h<12?Q.morning:h>=12&&h<17?Q.afternoon:h>=17&&h<21?Q.evening:Q.night;startQuotes();})();

    if('Notification' in window && Notification.permission==='default'){
      Notification.requestPermission().then(p=>{
        if(p==='granted' && navigator.serviceWorker.controller){
          navigator.serviceWorker.controller.postMessage({type:'WEATHER_NOTIFY',title:'SkyCheck is ready! ⛅',body:'Weather alerts are now active. You\'ll be notified of rain, storms & temperature changes.',icon:''});
        }
      });
    }
    // Then get location
    setTimeout(useLocation, 200);
  });

  document.getElementById('btnSkip').addEventListener('click',()=>{
    dismissOverlay();
  });
})();

async function fetchWeather(city) {
  if(!city)return; showLoader();
  try {
    const [wRes,fRes]=await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`)
    ]);
    if(!wRes.ok){const e=await wRes.json();throw new Error(e.message);}
    lastWeather=await wRes.json();
    lastForecast=fRes.ok?await fRes.json():null;
    const aqiRes=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lastWeather.coord.lat}&lon=${lastWeather.coord.lon}&appid=${API_KEY}`).catch(()=>null);
    lastAQI=aqiRes&&aqiRes.ok?await aqiRes.json():null;
    renderAll();scheduleRefresh(city,null,null);
  } catch(err){showError(err.message);}
}

async function fetchByCoords(lat,lon) {
  showLoader();
  try {
    const [wRes,fRes,aqiRes]=await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`),
      fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`).catch(()=>null)
    ]);
    if(!wRes.ok)throw new Error('Location not found');
    lastWeather=await wRes.json();
    lastForecast=fRes.ok?await fRes.json():null;
    lastAQI=aqiRes&&aqiRes.ok?await aqiRes.json():null;
    renderAll();scheduleRefresh(null,lat,lon);
  } catch(err){showError(err.message);}
}

function useLocation(){
  if(!navigator.geolocation)return showError('Geolocation not supported');
  locBtn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(
    p=>{locBtn.textContent='📍';fetchByCoords(p.coords.latitude,p.coords.longitude);},
    ()=>{locBtn.textContent='📍';showError('Location access denied. Type a city name.');}
  );
}

let refreshTimer=null;
function scheduleRefresh(city,lat,lon){
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(async()=>{
    try{
      const url=city?`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`:`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;
      const r=await fetch(url);if(!r.ok)return;
      const fresh=await r.json();checkAlerts(lastWeather,fresh);lastWeather=fresh;
    }catch(_){}
  },30*60*1000);
}

function checkAlerts(prev,curr){
  if(!prev)return;
  const pi=prev.weather[0].id,ci=curr.weather[0].id,city=curr.name;
  const t=Math.round(curr.main.temp),u=useCelsius?'°C':'°F';
  if(pi<500&&ci>=500&&ci<600)notify(`🌧️ Rain arriving in ${city}`,`Grab an umbrella! Currently ${t}${u}.`,curr.weather[0].icon);
  else if(pi<200&&ci>=200&&ci<300)notify(`⛈️ Thunderstorm in ${city}`,`Heavy storm — stay indoors.`,curr.weather[0].icon);
  else if(pi<600&&ci>=600&&ci<700)notify(`❄️ Snowfall in ${city}!`,`Bundle up — snow has started.`,curr.weather[0].icon);
  else if(curr.main.temp>38&&prev.main.temp<=38)notify(`🥵 Extreme heat in ${city}`,`${t}${u} — stay hydrated!`,curr.weather[0].icon);
  else if(curr.main.temp<0&&prev.main.temp>=0)notify(`🥶 Freezing in ${city}`,`${t}${u} — heavy layers needed.`,curr.weather[0].icon);
}
async function notify(title,body,iconCode){
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  const icon=`https://openweathermap.org/img/wn/${iconCode}@2x.png`;
  if(navigator.serviceWorker.controller)navigator.serviceWorker.controller.postMessage({type:'WEATHER_NOTIFY',title,body,icon});
  else new Notification(title,{body,icon});
}

/* ═══════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════ */
function renderAll(){
  updateGreeting(lastWeather);pickQuotes(lastWeather);
  renderWeatherCard(lastWeather);
  renderAQI(lastAQI);
  if(lastForecast){renderHourly(lastForecast);renderForecast(lastForecast);}
  renderMoonGolden(lastWeather);
  renderCompass(lastWeather);
  if(lastForecast)renderBestTime(lastForecast,lastWeather);
  renderHealth(lastWeather);
  renderNotify();
  transitionScene(lastWeather);
}

function updateGreeting(d){
  const hour=new Date((Date.now()/1000+d.timezone+new Date().getTimezoneOffset()*60)*1000).getHours();
  const g=hour>=5&&hour<12?`Good morning, ${d.name}! ☀️`:hour>=12&&hour<17?`Good afternoon, ${d.name}! 🌤️`:hour>=17&&hour<21?`Good evening, ${d.name}! 🌆`:`Good night, ${d.name}! 🌙`;
  const el=document.getElementById('greeting');el.style.opacity='0';
  setTimeout(()=>{el.textContent=g;el.style.opacity='1';},350);
}

function renderWeatherCard(d){
  const tC=d.main.temp,fC=d.main.feels_like;
  const temp=useCelsius?tC:toF(tC),feels=useCelsius?fC:toF(fC),unit=useCelsius?'°C':'°F';
  const icon=`https://openweathermap.org/img/wn/${d.weather[0].icon}@2x.png`;
  const sunrise=fmt(d.sys.sunrise,d.timezone),sunset=fmt(d.sys.sunset,d.timezone);
  const lTime=new Date((Date.now()/1000+d.timezone+new Date().getTimezoneOffset()*60)*1000);
  const dateStr=lTime.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const tip=getTip(d),outfit=getOutfit(d),com=getComfort(d);
  const uvi=estimateUVI(d),uviL=uviLabel(uvi);
  const pinned=pins.some(c=>c.toLowerCase()===d.name.toLowerCase());

  document.getElementById('main').innerHTML=`
    <div class="card" style="text-align:center">
      <img class="weather-icon-img" src="${icon}" alt="${d.weather[0].description}"/>
      <div class="city-name">${d.name}, ${d.sys.country}</div>
      <div class="country-date">${dateStr}</div>
      <div class="temp-main">${Math.round(temp)}${unit}</div>
      <div class="unit-toggle">
        <span class="${useCelsius?'active':''}" data-u="c">°C</span>
        <span class="${!useCelsius?'active':''}" data-u="f">°F</span>
      </div>
      <div class="condition">${d.weather[0].description}</div>
      <div class="uv-badge" style="background:${uviL.color}18;border:1px solid ${uviL.color}38;color:${uviL.color};margin:0 auto 14px">
        ☀️ UV ${uvi} — ${uviL.label}
      </div>
      <div class="narrative">${getNarrative(d)}</div>
      <div class="action-row">
        <button class="btn-action btn-pin${pinned?' pinned':''}" id="pinBtn" onclick="togglePin('${d.name}')">
          ${pinned?'📌 Pinned':'📌 Pin City'}
        </button>
        <button class="btn-action btn-share" onclick="shareWeather()">🔗 Share</button>
      </div>
      <div class="comfort-row">
        <span class="comfort-label">Comfort</span>
        <div class="comfort-track"><div class="comfort-fill" style="width:${com.s*10}%;background:${com.color}"></div></div>
        <span class="comfort-val" style="color:${com.color}">${com.s}/10</span>
      </div>
      <div class="tip-banner"><span class="tip-icon">${tip.icon}</span><span>${tip.text}</span></div>
      <div style="margin-bottom:14px">
        <div class="outfit-title">👗 What to wear today</div>
        <div class="outfit-items">${outfit.map(i=>`<span class="outfit-item">${i}</span>`).join('')}</div>
      </div>
      <div class="details-grid">
        <div class="detail-box"><div class="detail-icon">🌡️</div><div class="detail-label">Feels like</div><div class="detail-value">${Math.round(feels)}${unit}</div></div>
        <div class="detail-box"><div class="detail-icon">💧</div><div class="detail-label">Humidity</div><div class="detail-value">${d.main.humidity}%</div></div>
        <div class="detail-box"><div class="detail-icon">💨</div><div class="detail-label">Wind</div><div class="detail-value">${Math.round(d.wind.speed)} m/s</div></div>
        <div class="detail-box"><div class="detail-icon">👁️</div><div class="detail-label">Visibility</div><div class="detail-value">${(d.visibility/1000).toFixed(1)} km</div></div>
        <div class="detail-box"><div class="detail-icon">🔵</div><div class="detail-label">Pressure</div><div class="detail-value">${d.main.pressure} hPa</div></div>
        <div class="detail-box"><div class="detail-icon">☁️</div><div class="detail-label">Cloud cover</div><div class="detail-value">${d.clouds.all}%</div></div>
      </div>
      <div class="sun-times">
        <div class="sun-time"><span>🌅</span><span class="st-val">${sunrise}</span><span class="st-lbl">Sunrise</span></div>
        <div class="sun-time"><span>🌇</span><span class="st-val">${sunset}</span><span class="st-lbl">Sunset</span></div>
      </div>
    </div>`;

  document.getElementById('main').querySelectorAll('.unit-toggle span').forEach(el=>
    el.addEventListener('click',()=>{useCelsius=el.dataset.u==='c';renderWeatherCard(lastWeather);if(lastForecast){renderHourly(lastForecast);renderForecast(lastForecast);}})
  );
}

function renderAQI(data){
  const el=document.getElementById('aqiCard');
  if(!data){el.innerHTML='';return;}
  const aqi=data.list[0].main.aqi;
  const comp=data.list[0].components;
  const info=aqiInfo(aqi);
  const pct=((aqi-1)/4)*100;
  el.innerHTML=`
    <div class="card">
      <div class="section-label">🌬️ Air Quality Index</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:8px">
        <div>
          <div class="aqi-level" style="color:${info.color}">${info.label}</div>
          <div style="font-size:0.78rem;color:var(--muted)">AQI Level ${aqi} of 5</div>
        </div>
        <div style="flex:1">
          <div class="aqi-bar"><div class="aqi-indicator"><div class="aqi-thumb" style="left:${pct}%"></div></div></div>
          <div style="display:flex;justify-content:space-between;font-size:0.6rem;color:var(--muted);margin-top:4px"><span>Good</span><span>Very Poor</span></div>
        </div>
      </div>
      <div style="font-size:0.8rem;color:var(--muted);margin-bottom:12px">${info.advice}</div>
      <div class="aqi-components">
        <div class="aqi-comp"><div class="aqi-comp-val">${comp.pm2_5?.toFixed(1)??'—'}</div><div class="aqi-comp-lbl">PM2.5 μg/m³</div></div>
        <div class="aqi-comp"><div class="aqi-comp-val">${comp.pm10?.toFixed(1)??'—'}</div><div class="aqi-comp-lbl">PM10 μg/m³</div></div>
        <div class="aqi-comp"><div class="aqi-comp-val">${comp.no2?.toFixed(1)??'—'}</div><div class="aqi-comp-lbl">NO₂ μg/m³</div></div>
      </div>
    </div>`;
}

function renderHourly(f){
  const unit=useCelsius?'°C':'°F';
  const now=Date.now()/1000;
  const items=f.list.filter(i=>i.dt>now-3600).slice(0,9);
  document.getElementById('hourlyCard').innerHTML=`
    <div class="card">
      <div class="section-label">⏱️ 24-Hour Forecast</div>
      <div class="hourly-scroll">
        ${items.map((item,idx)=>{
          const t=Math.round(useCelsius?item.main.temp:toF(item.main.temp));
          const ico=`https://openweathermap.org/img/wn/${item.weather[0].icon}.png`;
          const pop=Math.round((item.pop??0)*100);
          const isNow=idx===0;
          return`<div class="hour-item${isNow?' now':''}">
            <span class="hour-time">${isNow?'Now':fmtHour(item.dt)}</span>
            <img class="hour-icon" src="${ico}" alt=""/>
            <span class="hour-temp">${t}${unit}</span>
            ${pop>0?`<span class="hour-pop">💧${pop}%</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderForecast(f){
  const days={};
  f.list.forEach(item=>{const d=new Date(item.dt*1000),key=d.toDateString(),h=d.getHours();if(!days[key]||Math.abs(h-12)<Math.abs(new Date(days[key].dt*1000).getHours()-12))days[key]=item;});
  const entries=Object.values(days).slice(1,6);
  const unit=useCelsius?'°C':'°F';
  document.getElementById('forecastCard').innerHTML=`
    <div class="card">
      <div class="section-label">📅 5-Day Forecast</div>
      <div class="forecast-row">
        ${entries.map(item=>{
          const date=new Date(item.dt*1000);
          const day=date.toLocaleDateString('en-US',{weekday:'short'});
          const hi=Math.round(useCelsius?item.main.temp_max:toF(item.main.temp_max));
          const lo=Math.round(useCelsius?item.main.temp_min:toF(item.main.temp_min));
          const ico=`https://openweathermap.org/img/wn/${item.weather[0].icon}.png`;
          return`<div class="forecast-day"><span class="day-name">${day}</span><img src="${ico}" alt=""/><span class="day-temp">${hi}${unit}</span><span class="day-low">${lo}${unit}</span></div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderMoonGolden(d){
  const moon=moonPhase(),golden=goldenHours(d.sys.sunrise,d.sys.sunset,d.timezone);
  document.getElementById('moonCard').innerHTML=`
    <div class="card">
      <div class="section-label">🌙 Moon Phase & Golden Hour</div>
      <div class="moon-row">
        <div class="moon-emoji">${moon.emoji}</div>
        <div class="moon-info">
          <div class="moon-name">${moon.name}</div>
          <div class="moon-illum"><span>💡 ${moon.ill}% illuminated</span><div class="illum-bar"><div class="illum-fill" style="width:${moon.ill}%"></div></div></div>
          <div class="moon-sub" style="margin-top:6px">${moon.daysToFull===0?'🌕 Full moon tonight!':moon.daysToFull===1?'Full moon tomorrow!': `Full moon in ${moon.daysToFull} days`}</div>
        </div>
      </div>
      <div class="golden-row">
        <div class="golden-item"><span class="golden-icon">🌅</span><span class="golden-val">${golden.morning}</span><span class="golden-lbl">Morning golden hour</span></div>
        <div class="golden-item"><span class="golden-icon">🌇</span><span class="golden-val">${golden.evening}</span><span class="golden-lbl">Evening golden hour</span></div>
      </div>
    </div>`;
}

function renderCompass(d){
  const bf=beaufort(d.wind.speed),dir=windDir(d.wind.deg??0);
  document.getElementById('compassCard').innerHTML=`
    <div class="card">
      <div class="section-label">🧭 Wind Direction</div>
      <div class="compass-wrap">
        <div class="compass-svg">${compassSVG(d.wind.deg??0,d.wind.speed)}</div>
        <div class="wind-info">
          <div class="wind-speed-big">${Math.round(d.wind.speed)}<span class="wind-unit">m/s</span></div>
          <div class="wind-dir-text">${dir} Wind</div>
          <div class="wind-desc">${bf.d}</div>
          <div class="beaufort-badge">💨 Beaufort Scale: <strong>${bf.n}</strong></div>
          ${d.wind.gust?`<div style="font-size:0.75rem;color:var(--muted);margin-top:6px">Gusts up to ${Math.round(d.wind.gust)} m/s</div>`:''}
        </div>
      </div>
    </div>`;
}

function renderBestTime(f,d){
  const slots=getBestTime(f,d.timezone);
  if(!slots){document.getElementById('bestTimeCard').innerHTML='';return;}
  const best=slots.reduce((a,b)=>b.score>a.score?b:a);
  document.getElementById('bestTimeCard').innerHTML=`
    <div class="card">
      <div class="section-label">✅ Best Time to Go Outside</div>
      <div class="best-time-main">${best.time}</div>
      <div class="best-time-cond">${best.t}${useCelsius?'°C':'°F'} · ${best.pop}% rain chance · Score ${best.score}/10</div>
      <div class="time-slots">
        ${slots.map(s=>{
          const isBest=s===best;
          const col=s.score>=8?'#22c55e':s.score>=6?'#fbbf24':s.score>=4?'#f97316':'#ef4444';
          return`<div class="time-slot${isBest?' best':''}"><div class="slot-dot" style="background:${col}"></div>${s.time} · ${s.t}${useCelsius?'°C':'°F'}${s.pop>0?` · 💧${s.pop}%`:''}</div>`;
        }).join('')}
      </div>
    </div>`;
}

function renderHealth(d){
  healthTips=getTipsForWeather(d);healthIdx=0;
  if(healthTimer)clearInterval(healthTimer);
  drawHealthTip();
  healthTimer=setInterval(()=>{healthIdx=(healthIdx+1)%healthTips.length;drawHealthTip();},8000);
}
function drawHealthTip(){
  const el=document.getElementById('healthCard');if(!el||!healthTips.length)return;
  const tip=healthTips[healthIdx];
  const dots=healthTips.map((_,i)=>`<div class="tip-dot${i===healthIdx?' active':''}" onclick="jumpTip(${i})"></div>`).join('');
  el.innerHTML=`
    <div class="card">
      <div class="section-label">💚 Health Tips</div>
      <div class="health-tip-card">
        <div class="health-tip-title">${tip.icon} ${tip.title}</div>
        <div class="health-tip-text">${tip.text}</div>
      </div>
      <div class="tip-dots">${dots}</div>
    </div>`;
}
function jumpTip(i){healthIdx=i;drawHealthTip();}

function renderNotify(){
  const granted=Notification.permission==='granted';
  document.getElementById('notifyBar').innerHTML=`
    <div class="notify-card">
      <div class="notify-info"><strong>🔔 Weather Alerts</strong><span>${granted?'Active — alerts for rain, storms & extreme temps.':'Get instant alerts for rain, storms & extreme temps.'}</span></div>
      ${granted?'<button class="btn-notify" disabled>✅ Active</button>':'<button class="btn-notify" id="allowNotify">Enable Alerts</button>'}
    </div>`;
  if(!granted)document.getElementById('allowNotify').addEventListener('click',async()=>{if(await Notification.requestPermission()==='granted')renderNotify();});
}

async function shareWeather(){
  if(!lastWeather)return;
  const d=lastWeather;
  const text=`📍 ${d.name}, ${d.sys.country}\n🌡️ ${Math.round(d.main.temp)}°C · ${d.weather[0].description}\n💧 Humidity: ${d.main.humidity}% · 💨 Wind: ${Math.round(d.wind.speed)} m/s\n\nChecked on SkyCheck ⛅`;
  if(navigator.share)await navigator.share({title:`SkyCheck — ${d.name} Weather`,text,url:window.location.href}).catch(()=>{});
  else{await navigator.clipboard.writeText(text).catch(()=>{});alert('Weather info copied to clipboard!');}
}

const MSGS=['Checking the skies…','Reading the clouds…','Consulting the wind…','Tuning into the atmosphere…','Fetching live conditions…'];
function showLoader(){
  document.getElementById('main').innerHTML=`<div class="loader"><div class="spinner"></div><span class="loader-text">${MSGS[Math.floor(Math.random()*MSGS.length)]}</span></div>`;
  ['aqiCard','hourlyCard','forecastCard','moonCard','compassCard','bestTimeCard','healthCard','notifyBar'].forEach(id=>{document.getElementById(id).innerHTML='';});
}
function showError(msg){document.getElementById('main').innerHTML=`<div class="error">⚠️ ${msg}</div>`;}
</script>
